<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TailorTex 2.0</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <h1>TailorTex 2.0</h1>
    <span id="api-status">Checking...</span>
  </header>

  <!-- FORM (always visible) -->
  <div id="form-section">

    <div class="field">
      <label for="company-name">Company / Output Title</label>
      <input type="text" id="company-name" placeholder="e.g. Google">
    </div>

    <div class="field">
      <label for="jd">Job Description</label>
      <textarea id="jd" placeholder="Paste or auto-extract from page..."></textarea>
    </div>

    <div class="field">
      <label for="resume-select">Base Resume</label>
      <select id="resume-select">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="field">
      <label for="method-select">AI Method</label>
      <select id="method-select">
        <option value="gemini">Gemini</option>
        <option value="claudecli">Claude</option>
      </select>
    </div>

    <div class="field">
      <label for="location-select">Location</label>
      <select id="location-select">
        <option value="">Loading...</option>
      </select>
    </div>

    <div class="checkboxes">
      <label><input type="checkbox" id="use-constraints" checked> Constraints</label>
      <label><input type="checkbox" id="use-projects" checked> Projects</label>
    </div>

    <button id="generate-btn" disabled>Generate Resume</button>
  </div>

  <!-- QUEUE (always visible below form) -->
  <div id="queue-section">
    <div id="queue-header">
      <span id="slot-counter">0 / 5 slots used</span>
      <button id="browse-output-btn">Browse Output</button>
    </div>
    <div id="job-list"></div>
  </div>

  <!-- OUTPUT BROWSER (hidden by default) -->
  <div id="output-section" style="display:none">
    <div id="output-header">
      <button id="output-back-btn">&larr; Back</button>
      <span id="output-title">Saved Resumes</span>
    </div>
    <div id="output-list"></div>
  </div>

  <!-- DETAILS VIEW (hidden by default) -->
  <div id="details-section" style="display:none">
    <div id="details-header">
      <button id="details-back-btn">&larr; Back</button>
      <span id="details-company-name"></span>
    </div>
    <div id="details-content"></div>
  </div>
  <div id="copy-toast" class="copy-toast">Copied!</div>

  <script src="popup.js"></script>
</body>
</html>
